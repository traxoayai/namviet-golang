definitions:
  domain.Appointment:
    properties:
      appointment_time:
        type: string
      check_in_time:
        type: string
      created_at:
        type: string
      doctor_id:
        type: integer
      id:
        type: string
      patient_id:
        type: integer
      service_type:
        description: e.g., 'examination'
        type: string
      status:
        description: '''pending'', ''waiting'', ''completed'', ''cancelled'''
        type: string
      updated_at:
        type: string
    type: object
  domain.AutoReplenishItemDTO:
    properties:
      avg_monthly_sales_base:
        type: number
      avg_monthly_sales_wholesale:
        type: number
      base_quantity:
        type: number
      conversion_factor:
        type: number
      current_stock_base:
        type: number
      current_stock_wholesale:
        type: number
      image_url:
        type: string
      product_id:
        type: integer
      product_name:
        type: string
      quantity_ordered:
        type: integer
      unit:
        type: string
      unit_price:
        type: number
    type: object
  domain.AutoReplenishPODTO:
    properties:
      delivery_status:
        type: string
      final_amount:
        type: number
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.AutoReplenishItemDTO'
        type: array
      order_code:
        type: string
      payment_status:
        type: string
      supplier_id:
        type: integer
      total_amount:
        type: number
    type: object
  domain.AutoReplenishResponse:
    properties:
      created_po_count:
        type: integer
      generated_pos:
        items:
          $ref: '#/definitions/domain.AutoReplenishPODTO'
        type: array
      message:
        type: string
    type: object
  domain.BookAppointmentRequest:
    properties:
      appointment_time:
        type: string
      doctor_id:
        type: integer
      patient_id:
        type: integer
      service_type:
        type: string
    required:
    - appointment_time
    - doctor_id
    - patient_id
    - service_type
    type: object
  domain.CheckInRequest:
    properties:
      notes:
        type: string
    type: object
  domain.CreateOrderRequest:
    properties:
      customer_id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.OrderItemRequest'
        minItems: 1
        type: array
      payment_method:
        type: string
      voucher_code:
        type: string
      warehouse_id:
        type: integer
    required:
    - customer_id
    - items
    - payment_method
    - warehouse_id
    type: object
  domain.CreatePOItemRequest:
    properties:
      is_bonus:
        type: boolean
      product_id:
        type: integer
      quantity_ordered:
        type: number
      unit:
        type: string
      unit_price:
        type: number
    required:
    - product_id
    - quantity_ordered
    - unit
    type: object
  domain.CreatePurchaseOrderRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.CreatePOItemRequest'
        type: array
      supplier_id:
        type: integer
    required:
    - items
    - supplier_id
    type: object
  domain.CreateReceiptRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.ReceiptItem'
        minItems: 1
        type: array
      note:
        type: string
      warehouse_id:
        type: integer
    required:
    - items
    - warehouse_id
    type: object
  domain.CreateTransactionRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      flow:
        type: string
      fund_account_id:
        type: integer
      ref_id:
        type: string
      ref_type:
        type: string
    required:
    - amount
    - flow
    - fund_account_id
    type: object
  domain.DeductStockRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.ValidateStockItem'
        minItems: 1
        type: array
      warehouse_id:
        type: integer
    required:
    - items
    - warehouse_id
    type: object
  domain.EarnLoyaltyRequest:
    properties:
      amount:
        type: number
      customer_id:
        type: integer
      order_id:
        type: integer
    required:
    - amount
    - customer_id
    - order_id
    type: object
  domain.Order:
    properties:
      created_at:
        type: string
      customer_id:
        type: integer
      delivery_status:
        type: string
      discount_amount:
        type: number
      final_amount:
        type: number
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.OrderItem'
        type: array
      order_code:
        type: string
      payment_method:
        type: string
      payment_status:
        description: unpaid, paid
        type: string
      status:
        description: pending, confirmed, completed
        type: string
      total_amount:
        type: number
      tracking_code:
        type: string
      updated_at:
        type: string
    type: object
  domain.OrderItem:
    properties:
      conversion_factor:
        type: number
      id:
        type: integer
      order_id:
        type: integer
      product_id:
        type: integer
      quantity:
        type: number
      total_price:
        type: number
      unit_price:
        type: number
      uom:
        type: string
    type: object
  domain.OrderItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        type: number
      unit_price:
        minimum: 0
        type: number
      uom:
        type: string
    required:
    - product_id
    - quantity
    - unit_price
    - uom
    type: object
  domain.PurchaseOrder:
    properties:
      created_at:
        type: string
      delivery_status:
        type: string
      final_amount:
        type: number
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.PurchaseOrderItem'
        type: array
      note:
        type: string
      order_code:
        type: string
      payment_status:
        type: string
      supplier_id:
        type: integer
      total_amount:
        type: number
      updated_at:
        type: string
    type: object
  domain.PurchaseOrderDetailDTO:
    properties:
      created_at:
        type: string
      delivery_status:
        type: string
      final_amount:
        type: number
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.PurchaseOrderItemDetailDTO'
        type: array
      note:
        type: string
      order_code:
        type: string
      payment_status:
        type: string
      supplier_id:
        type: integer
      total_amount:
        type: number
      updated_at:
        type: string
    type: object
  domain.PurchaseOrderItem:
    properties:
      base_quantity:
        description: Quantity in base unit
        type: number
      conversion_factor:
        type: number
      id:
        type: integer
      is_bonus:
        type: boolean
      product_id:
        type: integer
      purchase_order_id:
        type: integer
      quantity_ordered:
        type: number
      unit:
        type: string
      unit_price:
        type: number
    type: object
  domain.PurchaseOrderItemDetailDTO:
    properties:
      avg_monthly_sold:
        type: number
      base_quantity:
        type: number
      conversion_factor:
        type: number
      id:
        type: integer
      image_url:
        type: string
      is_bonus:
        type: boolean
      name:
        type: string
      product_id:
        type: integer
      quantity_ordered:
        type: number
      total_stock:
        type: number
      unit:
        type: string
      unit_price:
        type: number
    type: object
  domain.ReceiptItem:
    properties:
      batch_code:
        type: string
      expiry_date:
        type: string
      product_id:
        type: integer
      quantity:
        type: number
      unit_price:
        type: number
    required:
    - batch_code
    - expiry_date
    - product_id
    - quantity
    type: object
  domain.VATAllocationRequest:
    properties:
      customer_id:
        type: integer
      target_amount:
        type: number
    required:
    - customer_id
    - target_amount
    type: object
  domain.ValidateStockItem:
    properties:
      items_per_carton:
        description: Added for Purchasing
        type: integer
      product_id:
        type: integer
      quantity:
        type: number
      uom:
        description: The requested unit of measurement
        type: string
      wholesale_unit:
        description: Added for Purchasing
        type: string
    required:
    - product_id
    - quantity
    - uom
    type: object
  domain.ValidateStockRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.ValidateStockItem'
        minItems: 1
        type: array
      warehouse_id:
        type: integer
    required:
    - items
    - warehouse_id
    type: object
  domain.VerifyPromotionRequest:
    properties:
      customer_id:
        type: integer
      order_value:
        type: number
      voucher_code:
        type: string
    required:
    - order_value
    - voucher_code
    type: object
  domain.VerifyPromotionResponse:
    properties:
      discount_amount:
        type: number
      is_valid:
        type: boolean
      message:
        type: string
      promotion_id:
        type: integer
    type: object
  handlers.AIChatRequest:
    properties:
      message:
        type: string
    required:
    - message
    type: object
info:
  contact: {}
paths:
  /api/v1/ai/chat:
    post:
      consumes:
      - application/json
      description: Gửi câu hỏi cho AI và nhận câu trả lời dạng Server-Sent Events
        (SSE)
      parameters:
      - description: Chat request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/handlers.AIChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream
          schema:
            type: string
      summary: AI Chatbot Streaming
      tags:
      - System
  /api/v1/clinic/appointments:
    post:
      consumes:
      - application/json
      description: Lễ tân tạo lịch hẹn khám bệnh cho bệnh nhân
      parameters:
      - description: Book appointment request payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.BookAppointmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Appointment'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Đặt lịch khám
      tags:
      - Clinic
  /api/v1/clinic/appointments/{id}/check-in:
    post:
      consumes:
      - application/json
      description: Lễ tân xác nhận bệnh nhân đã tới và đưa vào hàng đợi chờ khám
      parameters:
      - description: Appointment ID
        in: path
        name: id
        required: true
        type: string
      - description: Check-in request payload
        in: body
        name: req
        schema:
          $ref: '#/definitions/domain.CheckInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Bệnh nhân Check-in
      tags:
      - Clinic
  /api/v1/crm/loyalty/earn:
    post:
      consumes:
      - application/json
      description: Cộng điểm cho khách hàng dựa trên giá trị đơn hàng
      parameters:
      - description: Earn loyalty request payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.EarnLoyaltyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Tích điểm thành viên
      tags:
      - CRM
  /api/v1/finance/transactions:
    post:
      consumes:
      - application/json
      description: Sinh phiếu thu chi, tự động chặn nếu vi phạm luật thuế, chẻ phiếu
        nếu lệch tiền
      parameters:
      - description: Create transaction request payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Tạo giao dịch thu/chi
      tags:
      - Finance
  /api/v1/finance/vat-allocation:
    post:
      consumes:
      - application/json
      description: Sử dụng thuật toán Knapsack để gom nhóm các Order Items khớp với
        tổng giá trị hóa đơn yêu cầu
      parameters:
      - description: VAT allocation request payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.VATAllocationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Phân bổ hóa đơn VAT
      tags:
      - Finance
  /api/v1/inventory/deduct:
    post:
      consumes:
      - application/json
      description: Trừ tồn kho theo thuật toán FEFO
      parameters:
      - description: Stock deduction request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.DeductStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Trừ tồn kho FEFO
      tags:
      - Inventory
  /api/v1/inventory/receipt:
    post:
      consumes:
      - application/json
      description: Nhập kho sản phẩm
      parameters:
      - description: Stock receipt request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.CreateReceiptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Nhập kho
      tags:
      - Inventory
  /api/v1/inventory/validate:
    post:
      consumes:
      - application/json
      description: Validate if stock is available for given items and warehouse
      parameters:
      - description: Stock validation request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.ValidateStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Kiểm tra tồn kho
      tags:
      - Inventory
  /api/v1/logistics/orders/{id}/shipping:
    post:
      description: Gửi API sang hãng vận chuyển để tạo mã vận đơn
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Tạo vận đơn giao hàng
      tags:
      - Logistics
  /api/v1/orders:
    post:
      consumes:
      - application/json
      description: Tạo đơn hàng, kiểm tra voucher, trừ tồn kho và ghi nhận thanh toán
      parameters:
      - description: Create order request payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Order'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Tạo đơn bán hàng
      tags:
      - Orders
  /api/v1/promotions/verify:
    post:
      consumes:
      - application/json
      description: Xác thực và tính toán số tiền được giảm của Voucher
      parameters:
      - description: Verify promotion request payload
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.VerifyPromotionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.VerifyPromotionResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Xác thực mã khuyến mãi
      tags:
      - Promotions
  /api/v1/purchasing/auto-replenish-min-max:
    post:
      consumes:
      - application/json
      description: Quét kho và tự động đẻ các đơn đặt hàng nháp cho sản phẩm thiếu
        hụt
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AutoReplenishResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Tạo dự trù mua hàng hàng loạt theo mức Min-Max
      tags:
      - Purchasing
  /api/v1/purchasing/orders:
    post:
      consumes:
      - application/json
      description: Tạo đơn hàng từ nhà cung cấp
      parameters:
      - description: Create PO request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/domain.CreatePurchaseOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.PurchaseOrder'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Tạo đơn đặt hàng PO
      tags:
      - Purchasing
  /api/v1/webhooks/logistics/status-update:
    post:
      consumes:
      - application/json
      description: Hãng vận chuyển gọi API này để báo cáo trạng thái đơn hàng
      produces:
      - application/json
      responses: {}
      summary: Webhook nhận trạng thái từ GHN
      tags:
      - Logistics
  /purchasing/orders/{id}:
    get:
      consumes:
      - application/json
      description: Get purchase order details including enriched item data like total_stock
        and avg_monthly_sold
      parameters:
      - description: Purchase Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.PurchaseOrderDetailDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get purchase order details
      tags:
      - purchasing
  /ws/v1/clinic/queue:
    get:
      description: Kết nối WebSocket để nhận realtime updates từ queue
      responses: {}
      summary: WebSocket cho hàng đợi
      tags:
      - Clinic
swagger: "2.0"
